<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PN98-Probenahme</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; margin: 20px; background: #f5f5f5; }
.box { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
input, select, textarea { width: 100%; margin-bottom: 10px; }
textarea { height:60px; }
button { padding:10px; margin-top:10px; }
.logo { position:absolute; top:10px; right:20px; height:60px; }
</style>
</head>

<body>

<img src="bauanalytix_rz_farbe einzeln_klein.jpg" class="logo" id="logoImg">

<h1>PN98-Probenahmeprotokoll</h1>

<div class="box">
<h2>1. Allgemeine Daten</h2>

Projektnummer<input id="projNr">
Projektname<input id="projName">
Auftraggeber<input id="auftraggeber">
Probenahmeort<input id="ort">
Datum<input id="datum">

Projektverantwortliche
<select id="verantwortlich">
<option>Daniela Oehmichen</option>
<option>Werner Schalk</option>
</select>

Anlass
<select id="anlass">
<option>Deklaration zur Entsorgung</option>
<option>Beweissicherung</option>
</select>

Bemerkungen<textarea id="bem"></textarea>
</div>

<div class="box">
<h2>2. Haufwerk</h2>

Material<input id="material">
AVV<input id="avv">
Volumen<input id="vol">

Einzelproben<input id="ep">
Mischproben<input id="mp" type="number">
Laborproben<input id="lp">

<button onclick="generateProben()">Mischproben erzeugen</button>
</div>

<div class="box">
<h2>3. Mischproben</h2>
<div id="probenContainer"></div>
</div>

<button onclick="createPDF()">PDF erstellen</button>

<script>

function generateProben(){
let mp = parseInt(document.getElementById("mp").value);
if(isNaN(mp) || mp <= 0){ alert("Bitte Mischproben eingeben"); return; }

let container = document.getElementById("probenContainer");
container.innerHTML = "";

for(let i=1;i<=mp;i++){
let div = document.createElement("div");
div.className = "box";

div.innerHTML = `
<h3>Mischprobe ${i}</h3>
Proben-ID<input class="pid">
Material<textarea class="mat"></textarea>
Konsistenz<select class="kons"><option>fest</option><option>schlammig</option><option>flüssig</option></select>
Geruch<select class="ger"><option>unauffällig</option><option>muffig</option><option>ölig</option><option>chemisch</option></select>
Volumen<input class="volp">
`;

container.appendChild(div);
}
}

function createPDF(){

const {jsPDF}=window.jspdf;
let doc=new jsPDF();

let y=10;

/* Logo */
let logo=document.getElementById("logoImg");
try{
let canvas=document.createElement("canvas");
canvas.width=logo.width;
canvas.height=logo.height;
let ctx=canvas.getContext("2d");
ctx.drawImage(logo,0,0);
let imgData=canvas.toDataURL("image/png");
doc.addImage(imgData,"PNG",150,5,40,15);
}catch(e){}

/* Titel */
doc.setFontSize(14);
doc.text("PN98-Probenahmeprotokoll",10,y);
y+=10;

/* Abschnitt 1 */
doc.setFontSize(11);
doc.text("1. Allgemeine Daten",10,y); y+=6;

doc.setFontSize(9);
doc.text("Projekt: "+document.getElementById("projName").value,10,y); y+=5;
doc.text("Auftraggeber: "+document.getElementById("auftraggeber").value,10,y); y+=5;
doc.text("Ort: "+document.getElementById("ort").value,10,y); y+=5;
doc.text("Datum: "+document.getElementById("datum").value,10,y); y+=5;
doc.text("Verantwortlich: "+document.getElementById("verantwortlich").value,10,y); y+=8;

/* Abschnitt 2 */
doc.setFontSize(11);
doc.text("2. Haufwerk",10,y); y+=6;

doc.setFontSize(9);
doc.text("Material: "+document.getElementById("material").value,10,y); y+=5;
doc.text("AVV: "+document.getElementById("avv").value,10,y); y+=5;
doc.text("Volumen: "+document.getElementById("vol").value,10,y); y+=5;
doc.text("MP: "+document.getElementById("mp").value,10,y); y+=8;

/* Abschnitt 3 */
doc.setFontSize(11);
doc.text("3. Mischproben",10,y); y+=6;

let blocks=document.querySelectorAll("#probenContainer .box");

blocks.forEach((b,i)=>{
doc.setFontSize(10);
doc.text("Probe "+(i+1),10,y); y+=5;

doc.setFontSize(9);
doc.text("ID: "+b.querySelector(".pid").value,10,y); y+=5;
doc.text("Material: "+b.querySelector(".mat").value,10,y); y+=5;
doc.text("Konsistenz: "+b.querySelector(".kons").value,10,y); y+=5;
doc.text("Geruch: "+b.querySelector(".ger").value,10,y); y+=5;
doc.text("Volumen: "+b.querySelector(".volp").value,10,y); y+=8;

if(y>270){ doc.addPage(); y=10; }
});

doc.save("PN98_Protokoll.pdf");
}

</script>

</body>
</html>
